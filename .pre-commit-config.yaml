
# .pre-commit-config.yaml
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
        args: ["--maxkb=2000"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/kynan/nbstripout
    rev: 0.8.1
    hooks:
      - id: nbstripout
        files: \.ipynb$

  # Jupytext (sync de notebooks + scripts pareados)
  - repo: local
    hooks:
      - id: jupytext-sync
        name: jupytext --sync (paired notebooks)
        entry: python -m jupytext --sync
        language: python
        additional_dependencies: [jupytext]
        files: ^notebooks/.*\.(ipynb|py)$
